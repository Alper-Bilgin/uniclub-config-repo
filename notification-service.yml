# Notification Service Configuration
server:
  port: 9006

spring:
  # Veritabanı (Loglama için)
  datasource:
    url: jdbc:postgresql://localhost:5432/uniclub_db
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notification_schema

  # Mail Sunucusu (Docker Mailpit)
  mail:
    host: localhost
    port: 1025 # Mailpit SMTP portu
    username: null
    password: null
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  # RabbitMQ Bağlantısı
  rabbitmq:
    host: localhost
    port: 5672

# Özel Ayarlarımız (RabbitMQ Kuyruk İsimleri)
notification:
  rabbitmq:
    queue:
      welcome-email: "notification_welcome_email_queue"
      ticket-email: "notification_ticket_email_queue"
      follow-email: "notification_follow_email_queue" # YENİ
    exchange:
      user: "user_exchange"
      notification: "notification_exchange"
      follow: "follow_exchange" # YENİ (Follow service'in kullandığı isim)
    routing-key:
      user-created: "user.created.key"
      ticket-created: "ticket.created.key"
      follow-event: "follow.created.key" # YENİ (Follow service'in routing keyi)
